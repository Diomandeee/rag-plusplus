name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          sccache: 'true'
      - name: Run tests
        run: |
          pip install pytest numpy
          python -c "
          from rag_plusplus import RAGPlusPlus, HNSWIndex, FlatIndex, __version__
          import numpy as np
          print(f'Version: {__version__}')

          # Test RAGPlusPlus
          rag = RAGPlusPlus(dimension=64, use_hnsw=True)
          for i in range(10):
              rag.add(f'doc_{i}', np.random.randn(64).astype(np.float32), f'ctx_{i}', 0.5)
          results = rag.query(np.random.randn(64).astype(np.float32), k=5)
          assert len(results) == 5, f'Expected 5 results, got {len(results)}'

          # Test HNSWIndex
          hnsw = HNSWIndex(dimension=32)
          for i in range(50):
              hnsw.add(f'vec_{i}', np.random.randn(32).astype(np.float32))
          assert hnsw.len == 50

          # Test FlatIndex
          flat = FlatIndex(dimension=16)
          for i in range(20):
              flat.add(f'f_{i}', np.random.randn(16).astype(np.float32))
          assert flat.len == 20

          print('All tests passed!')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust fmt
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy -- -D warnings
